name: "Bug Report"
description: "File a bug report. For support or ideas, use the proper forum in Discussions."
title: "[Bug]: "
labels: ["bug"]
body:
- type: checkboxes
  id: before_reporting
  attributes:
    label: "Before Reporting"
    description: "Please confirm the following:"
    options:
    - label: "I have searched for existing issues"
      required: true
    - label: "I am using the latest version"
      required: true
  validations:
    required: true
- type: checkboxes
  id: mod_loaders
  id: mod_loaders
  attributes:
    label: "Mod Loaders"
    description: "Which mod loaders you are experiencing this issue on."
    options:
      - label: "Fabric"
      - label: "Forge"
      - label: "NeoForge"
  validations:
    required: true
- type: input
  id: minecraft_version
  attributes:
    label: "Minecraft Version"
    description: "Which Minecraft version(s) do you experience this issue on?"
  validations:
    required: true
- type: input
  id: mod_loader_version
  attributes:
    label: "Mod Loader Version"
    description: "Which mod loader version(s) do you experience this issue on?"
  validations:
    required: true
- type: textarea
  id: describe_the_bug
  attributes:
    label: "Describe the Bug"
    description: "A clear and concise description of what the bug is."
    placeholder: "Tell us what happened..."
  validations:
    required: true
- type: textarea
  id: expected_behavior
  attributes:
    label: "Expected Behavior"
    description: "What you expected to happen."
    placeholder: "I expected..."
  validations:
    required: true
- type: textarea
  id: steps_to_reproduce
  attributes:
    label: "Steps to Reproduce"
    description: "Steps to reproduce the behavior."
    placeholder: |
      1.
      2.
      3.
      ...
  validations:
    required: true
- type: upload
  id: screenshots_logs
  attributes:
    label: "Screenshots / Logs"
    description: "If applicable, add screenshots or log output to help explain the problem."
  validations:
    required: false